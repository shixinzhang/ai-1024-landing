<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AI_1024 专栏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        .tips {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .tips-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
        }
        .browser-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 28px;
        }
        .wechat-tips {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            text-align: left;
        }
        .wechat-tips strong {
            color: #faad14;
        }
        .arrow {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 48px;
            color: white;
            animation: bounce 1.5s infinite;
            display: none;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 微信内显示提示 -->
    <div id="wechat-tips" class="arrow">👆</div>
    
    <div class="container">
        <div class="icon">🚀</div>
        <h1>转型 AI 工程师</h1>
        <p class="subtitle">提升你在 AI 时代的竞争力<br>系统化的 AI 应用开发实战课程</p>
        
        <a href="https://xiaobot.net/p/earnByYourself" class="btn btn-primary" target="_blank">
            💎 订阅年卡 ¥169
        </a>
        <a href="https://xiaobot.net/p/ai_1024" class="btn btn-secondary" target="_blank">
            🔥 永久权限 ¥498
        </a>
        
        <div class="tips">
            <p class="tips-title">推荐使用浏览器访问</p>
            <div class="browser-icons">
                <span>🌐</span>
                <span>📱</span>
                <span>💻</span>
            </div>
        </div>
        
        <div id="wechat-guide" class="wechat-tips hidden">
            <strong>💡 微信打不开？</strong><br>
            点击右上角「···」→「在浏览器打开」<br>
            或使用 Safari/Chrome 访问本页面
        </div>
        
        <div style="margin-top: 20px; font-size: 12px; color: #999;">
            <a href="https://shixinzhang.github.io/ai-1024-landing/" style="color: #667eea; text-decoration: none;">
                查看完整介绍页 →
            </a>
        </div>
    </div>

    <script>
        // 检测是否在<-IMG_0>-内
        function isWechat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }
        
        // 检测是否在 QQ 内
        function isQQ() {
            return /QQ\//i.test(navigator.userAgent) || /QZone/i.test(navigator.userAgent);
        }
        
        if (isWechat() || isQQ()) {
            document.getElementById('wechat-tips').style.display = 'block';
            document.getElementById('wechat-guide').classList.remove('hidden');
        }
        
        // 尝试自动跳转（某些情况下可行）
        function openInBrowser(url) {
            var a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('target', '_blank');
            a.setAttribute('id', 'external-link');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        
        // 备用方案：生成二维码
        function generateQR(url) {
            // 这里可以集成 QRCode.js
            console.log('QR Code for:', url);
        }
    </script>
</body>
</html>
